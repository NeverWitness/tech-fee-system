name: Deploy MkDocs site to Pages

on:
#  push:
#    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

env:
  NO_MKDOCS_2_WARNING: "1"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "mkdocs<2" "mkdocs-material<10" "mkdocs-static-i18n"

      - name: Prepare build docs
        run: |
          rm -rf build_docs
          mkdir -p build_docs
          rsync -a --exclude '_drafts' docs/zh-CN/ build_docs/zh/
          rsync -a --exclude '_drafts' docs/en-US/ build_docs/en/

          # Inject SEO front matter into homepage
          sed -i "1i\\---\\title: 技术费用框架\\description: 技术费用框架：解释技术时代价格结构、技术扩散与收入分配的新模型\\---\\" build_docs/zh/index.md

          sed -i "1i\\---\\title: Technology Fee Framework\\description: A framework explaining price structure, technology diffusion, and income distribution in the technological era\\---\\" build_docs/en/index.md

      - name: Set build date
        run: |
          echo "BUILD_DATE=$(date -u '+%Y-%m-%d %H:%M UTC')" >> $GITHUB_ENV

      - name: Inject build date into homepage
        run: |
          DATE="$BUILD_DATE"
          # 在第一行标题后插入一行
          sed -i "1a\\
          > *Build: $DATE*\\
          \\
          ---\\
          \\
          " build_docs/zh/index.md
          sed -i "1a\\
          > *Build: $DATE*\\
          \\
          ---\\
          \\
          " build_docs/en/index.md

      - name: Build site
        run: mkdocs build --strict

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
